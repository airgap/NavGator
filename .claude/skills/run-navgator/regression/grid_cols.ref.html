<!doctype html><meta charset="utf-8"><title>css grid 3-col — reference (flex)</title>
<style>
  html, body { margin: 0; background: #fff; font: 18px sans-serif; }
  /* The same 3-column layout built with flexbox (which Servo lays out correctly).
     Same content width, gap, and equal columns -> identical cell positions. */
  .g { display: flex; flex-wrap: wrap; gap: 12px; padding: 20px; }
  .c { background: #4a90d9; color: #fff; padding: 26px 0; text-align: center; font-weight: 700;
       flex: 0 0 calc((100% - 24px) / 3); }
</style>
<div class="g">
  <div class="c">1</div><div class="c">2</div><div class="c">3</div>
  <div class="c">4</div><div class="c">5</div><div class="c">6</div>
</div>
