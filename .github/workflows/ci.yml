# swerve CI — build on Linux / macOS / Windows (all first-class, per ROADMAP §R2/D2).
#
# HONEST STATUS: a STARTING SCAFFOLD, not yet validated on hosted runners. Building
# swerve compiles our Servo fork (mozjs/SpiderMonkey + ANGLE) — a multi-GB, long build.
# To be practical this needs sccache warm caches and very likely a self-hosted or
# larger runner (a Phase-0 deliverable — see docs/ROADMAP.md §Phase 0 and docs/FORK.md).
# Linux is the required gate; macOS/Windows start non-blocking until green, then flip
# to required.

name: CI
on:
  push:
    branches: [dev, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash # bash is available on all three runners (Git Bash on Windows)

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, required: true }
          - { os: macos-latest, required: false }
          - { os: windows-latest, required: false }
    continue-on-error: ${{ !matrix.required }}
    steps:
      - uses: actions/checkout@v4

      # A single consistent LLVM is required: mozjs needs a bare `llvm-objdump` on PATH
      # and bindgen needs a matching `libclang` (see README troubleshooting).
      - name: LLVM/Clang + native deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang libclang-dev cmake pkg-config python3 curl xvfb
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
      - name: LLVM/Clang (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm cmake pkg-config
          P="$(brew --prefix llvm)"
          echo "$P/bin" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$P/lib" >> "$GITHUB_ENV"
      - name: LLVM/Clang (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y llvm cmake
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\lib" >> "$GITHUB_ENV"

      - name: Toolchain (pinned by rust-toolchain.toml)
        run: rustup show

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.6
      - run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --locked

      - name: Headless smoke (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a -s "-screen 0 1280x800x24" \
            env LIBGL_ALWAYS_SOFTWARE=1 GALLIUM_DRIVER=llvmpipe \
            timeout --signal=KILL 30 ./target/debug/swerve || true

  # Maintained-fork canary: rebuild against the latest upstream Servo to surface merge
  # breakage early (see docs/FORK.md). Stub until the merge tooling lands in Phase 0.
  upstream-canary:
    name: upstream canary (non-blocking)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: echo "TODO (Phase 0): merge airgap/swervo main <- servo/servo, build, report drift. See docs/FORK.md."
