<!DOCTYPE html>
<!--
  navgator chrome — the browser UI itself, as an HTML document rendered by Servo.

  The OS window decorations are disabled (main.rs `with_decorations(false)`), so this
  document draws its own titlebar, window controls, and drag region. Only the .chrome
  bar is painted by this document; the .viewport region is a hole where the content
  webview is composited underneath. See docs/ARCHITECTURE.md.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NavGator</title>
    <link rel="stylesheet" href="chrome.css" />
  </head>
  <body>
    <header class="chrome">
      <!-- Titlebar: drag region (empty space) + tabs + window controls. -->
      <div class="titlebar" id="titlebar">
        <div class="tabstrip" id="tabstrip"></div>
        <div class="wincontrols">
          <button class="wbtn" id="win-min" aria-label="Minimize" title="Minimize">&#x2212;</button>
          <button class="wbtn" id="win-max" aria-label="Maximize" title="Maximize">&#x25A1;</button>
          <button class="wbtn wclose" id="win-close" aria-label="Close" title="Close">&#x2715;</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="nav">
          <button class="btn" id="back" aria-label="Back" disabled>‹</button>
          <button class="btn" id="forward" aria-label="Forward" disabled>›</button>
          <button class="btn" id="reload" aria-label="Reload">⟳</button>
        </div>

        <form class="omnibox" id="omnibox">
          <span class="omnibox-scheme" id="scheme">navgator</span>
          <input
            id="address"
            class="address"
            type="text"
            spellcheck="false"
            autocomplete="off"
            placeholder="Search or enter address"
          />
        </form>

        <div class="actions">
          <button class="btn" id="menu" aria-label="Settings" title="Settings">⚙</button>
        </div>
      </div>
    </header>

    <!-- The content webview is composited into this region. -->
    <main class="viewport" id="viewport"></main>

    <!-- Modal for JS dialogs (alert/confirm/prompt). The engine suppresses the content
         blit while this is shown, so it appears over the page region. -->
    <div class="modal-backdrop" id="modal">
      <div class="modal">
        <p class="modal-msg" id="modal-msg"></p>
        <input class="modal-input" id="modal-input" type="text" spellcheck="false" />
        <input class="modal-input" id="modal-input2" type="password" spellcheck="false" />
        <div class="modal-list" id="modal-list"></div>
        <div class="modal-actions">
          <button class="btn-text" id="modal-cancel">Cancel</button>
          <button class="btn-accent" id="modal-ok">OK</button>
        </div>
      </div>
    </div>

    <script src="chrome.js"></script>
  </body>
</html>
