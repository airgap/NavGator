<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NavGator</title>
<style>
  /* The chrome's bundled fonts, served by the engine from gator://font/* so the page matches
     the native chrome exactly. System families remain as fallback if a load fails. */
  @font-face { font-family:'NavGrotesk'; src:url('gator://font/grotesk') format('truetype'); font-weight:300 700; font-display:swap; }
  @font-face { font-family:'NavSans';    src:url('gator://font/outfit')  format('truetype'); font-weight:300 700; font-display:swap; }
  @font-face { font-family:'NavMono';    src:url('gator://font/mono')    format('truetype'); font-weight:400 700; font-display:swap; }
  /* Theme tokens are substituted from the live OKLCH chrome theme (see themed()). */
  :root {
    --accent: __ACCENT__; --accent-rgb: __ACCENT_RGB__;
    --bg:__BG__; --panel:__PANEL__; --elev:__ELEV__; --line:__LINE__; --fg:__FG__; --muted:__MUTED__;
    --display: 'NavGrotesk', ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
    --sans: 'NavSans', system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: 'NavMono', ui-monospace, "JetBrains Mono", "SF Mono", "Cascadia Code", Menlo, monospace;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    background: var(--bg); __WALLPAPER__ color: var(--fg);
    font: 16px/1.5 var(--sans);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  /* Subtle decorative wash, lower-right (matches the design). */
  body::after {
    content:""; position:fixed; right:-12vw; bottom:-18vh; width:60vw; height:60vw;
    border-radius:50%; pointer-events:none; z-index:0;
    background: radial-gradient(circle at 50% 50%, rgba(var(--accent-rgb), .07), transparent 62%);
  }
  .wrap { position:relative; z-index:1; max-width:880px; margin:0 auto; padding: 9vh 28px 64px; }
  .hidden { display:none !important; }

  /* Clock + greeting */
  .date { font: 600 12px/1 var(--mono); letter-spacing:1.5px; color: var(--muted); text-transform:uppercase; }
  .clock { display:flex; align-items:baseline; gap:20px; margin:14px 0 40px; flex-wrap:wrap; }
  .time { font: 300 78px/1 var(--display); letter-spacing:-2px; color: var(--fg); }
  .greet { font-size:26px; color: var(--muted); }

  /* Search box — focuses the native omnibar (gator://omnibar is intercepted by the chrome) */
  a.search {
    display:flex; align-items:center; gap:13px; text-decoration:none;
    background: var(--panel); border:1.5px solid var(--line); border-radius:16px;
    padding:17px 18px; color: var(--muted); font-size:16px; cursor:text;
    transition: border-color .15s, box-shadow .15s;
  }
  a.search:hover { border-color: rgba(var(--accent-rgb), .55); box-shadow:0 0 0 4px rgba(var(--accent-rgb), .08); }
  a.search .dot { flex:none; width:9px; height:9px; border-radius:50%; background: var(--accent); }
  a.search .ph { flex:1; }
  a.search .kbd { flex:none; font: 600 12px var(--mono); color: var(--muted);
    border:1px solid var(--line); border-radius:7px; padding:3px 8px; background: var(--bg); }

  /* Section label */
  .label { font: 600 12px/1 var(--mono); letter-spacing:1.5px; color: var(--muted);
    text-transform:uppercase; margin:42px 0 14px; }

  /* Top sites */
  .grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; }
  a.tile {
    display:flex; flex-direction:column; align-items:center; gap:9px; text-decoration:none;
    background: var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px 8px;
    color: var(--muted); font-size:12px; transition: border-color .15s, transform .12s;
  }
  a.tile:hover { border-color: rgba(var(--accent-rgb), .55); transform: translateY(-2px); }
  a.tile .av { position:relative; overflow:hidden; width:42px; height:42px; border-radius:13px;
    display:flex; align-items:center; justify-content:center; color:#fff; font: 700 18px var(--display); }
  a.tile .av img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
    padding:9px; background:inherit; opacity:0; transition:opacity .12s; }
  a.tile .av img.on { opacity:1; }
  a.tile .nm { max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* Notes + reading list */
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:34px; }
  .card { background: var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px 22px; }
  .card h2 { font-size:14px; font-weight:600; color: var(--fg); margin:0 0 14px; }
  .note { display:flex; align-items:center; gap:11px; padding:5px 0; color: var(--fg); font-size:14px; cursor:pointer; }
  .note .ck { flex:none; width:18px; height:18px; border-radius:6px; border:1.6px solid var(--line); }
  .note.done .ck { background: var(--accent); border-color: var(--accent); }
  .note .tx { flex:1; }
  .note.done .tx { color: var(--muted); text-decoration:line-through; }
  .read { position:relative; padding:10px 26px 10px 0; border-top:1px solid var(--line); }
  .read:first-of-type { border-top:0; }
  .read .ti { color: var(--fg); font-size:14px; text-decoration:none; }
  .read a.ti:hover { color: var(--accent); }
  .read .me { color: var(--muted); font: 12px var(--mono); margin-top:3px; }
  .rm { color: var(--muted); cursor:pointer; opacity:0; font-size:17px; line-height:1; padding:0 4px; user-select:none; }
  .note .rm { margin-left:auto; }
  .read .rm { position:absolute; right:0; top:9px; }
  .note:hover .rm, .read:hover .rm { opacity:.55; }
  .rm:hover { opacity:1 !important; color: var(--fg); }
  .add { width:100%; margin-top:13px; background: var(--bg); border:1px solid var(--line); border-radius:9px;
    padding:8px 11px; color: var(--fg); font:13px var(--sans); outline:none; }
  .add:focus { border-color: rgba(var(--accent-rgb), .5); }
  .add::placeholder { color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <section class="clock-wrap __CLOCK_HIDE__">
      <div class="date" id="date">&nbsp;</div>
      <div class="clock">
        <span class="time" id="time">&nbsp;</span>
        <span class="greet" id="greet"></span>
      </div>
    </section>

    <a class="search __SEARCH_HIDE__" href="gator://omnibar">
      <span class="dot"></span>
      <span class="ph">Search the web, your tabs, or type a command&hellip;</span>
      <span class="kbd">&#8984;K</span>
    </a>

    <section class="__SITES_HIDE__">
      <div class="label">Top sites</div>
      <div class="grid">__TOPSITES__</div>
    </section>

    <div class="cards">
      <div class="card __NOTES_HIDE__">
        <h2>Notes</h2>
        <div id="notes"></div>
        <input id="note-add" class="add" placeholder="Add a note, press Enter&hellip;" autocomplete="off" spellcheck="false">
      </div>
      <div class="card __FEED_HIDE__">
        <h2>Reading list</h2>
        <div id="reading"></div>
        <input id="read-add" class="add" placeholder="Add a link or note, press Enter&hellip;" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>
<script>
  function pad(n){ return n < 10 ? '0' + n : '' + n; }
  function tick(){
    var d = new Date();
    var days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
    var mons = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
    var date = document.getElementById('date');
    if (date) date.textContent = days[d.getDay()] + ', ' + mons[d.getMonth()] + ' ' + d.getDate();
    var h = d.getHours(); var ampm = h < 12 ? 'AM' : 'PM'; var h12 = h % 12; if (h12 === 0) h12 = 12;
    var time = document.getElementById('time');
    if (time) time.textContent = h12 + ':' + pad(d.getMinutes()) + ' ' + ampm;
    var g = h < 5 ? 'Good night' : h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    var greet = document.getElementById('greet');
    if (greet) greet.textContent = g;
  }
  tick(); setInterval(tick, 1000);

  // Notes + reading list: editable, persisted in this page's localStorage (gator://welcome
  // origin). All storage access is guarded so it degrades to in-session-only if unavailable.
  function load(k, d){ try { return JSON.parse(localStorage.getItem(k)) || d; } catch(e){ return d; } }
  function save(k, v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
  function esc(s){ return String(s).replace(/[&<>"]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function host(u){ try { return new URL(u).host.replace(/^www\./,''); } catch(e){ return ''; } }

  var NOTES = load('nav_notes', [
    { t:'Ship vertical-tabs experiment', d:true },
    { t:'Review Studio onboarding copy', d:false },
    { t:'Sync OKLCH token export', d:false }
  ]);
  var READING = load('nav_reading', [
    { t:'The case for native browser chrome', u:'https://airgap.dev' },
    { t:'OKLCH theming in practice', u:'https://evilmartians.com' },
    { t:'Embedding Servo, lessons', u:'https://servo.org' }
  ]);

  function renderNotes(){
    var el = document.getElementById('notes'); if (!el) return;
    el.innerHTML = NOTES.map(function(n, i){
      return '<div class="note' + (n.d ? ' done' : '') + '" data-i="' + i + '">' +
        '<span class="ck"></span><span class="tx">' + esc(n.t) + '</span><span class="rm">&times;</span></div>';
    }).join('');
  }
  function renderReading(){
    var el = document.getElementById('reading'); if (!el) return;
    el.innerHTML = READING.map(function(r, i){
      var h = r.u ? host(r.u) : '';
      var title = r.u ? '<a class="ti" href="' + esc(r.u) + '">' + esc(r.t) + '</a>'
                      : '<span class="ti">' + esc(r.t) + '</span>';
      return '<div class="read" data-i="' + i + '">' + title +
        (h ? '<div class="me">' + esc(h) + '</div>' : '') + '<span class="rm">&times;</span></div>';
    }).join('');
  }

  var notesEl = document.getElementById('notes');
  if (notesEl) notesEl.addEventListener('click', function(e){
    var row = e.target.closest('.note'); if (!row) return;
    var i = +row.dataset.i;
    if (e.target.classList.contains('rm')) NOTES.splice(i, 1);
    else NOTES[i].d = !NOTES[i].d;
    save('nav_notes', NOTES); renderNotes();
  });
  var readingEl = document.getElementById('reading');
  if (readingEl) readingEl.addEventListener('click', function(e){
    if (!e.target.classList.contains('rm')) return;
    var row = e.target.closest('.read'); if (!row) return;
    READING.splice(+row.dataset.i, 1);
    save('nav_reading', READING); renderReading();
  });
  var noteAdd = document.getElementById('note-add');
  if (noteAdd) noteAdd.addEventListener('keydown', function(e){
    if (e.key !== 'Enter' || !this.value.trim()) return;
    NOTES.push({ t:this.value.trim(), d:false }); this.value = '';
    save('nav_notes', NOTES); renderNotes();
  });
  var readAdd = document.getElementById('read-add');
  if (readAdd) readAdd.addEventListener('keydown', function(e){
    if (e.key !== 'Enter' || !this.value.trim()) return;
    var v = this.value.trim();
    var u = /^https?:\/\//i.test(v) ? v : (/^[^\s]+\.[^\s]{2,}$/.test(v) ? 'https://' + v : '');
    READING.push({ t: u ? host(u) : v, u: u }); this.value = '';
    save('nav_reading', READING); renderReading();
  });
  renderNotes(); renderReading();
</script>
</body>
</html>
