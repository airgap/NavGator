<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>History · NavGator</title>
<style>
  :root { --accent: __ACCENT__; --bg:#0e1014; --panel:#171a21; --line:#262b36; --fg:#e8eaed; --muted:#9aa0aa; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding: 7vh 24px 28px; min-height:100%;
  }
  .head { width:min(760px,94vw); margin:0 0 24px; }
  h1 { font-size:34px; font-weight:800; letter-spacing:-1px; margin:0; }
  h1 .g { color: var(--accent); }
  .sub { color: var(--muted); margin:6px 0 0; font-size:14px; }
  .list { width:min(760px,94vw); display:flex; flex-direction:column; gap:8px; }
  .row {
    display:flex; align-items:baseline; gap:14px;
    background: var(--panel); border:1px solid var(--line); border-radius:11px;
    padding:13px 16px; text-decoration:none; color: var(--fg); transition:border-color .15s;
    overflow:hidden;
  }
  .row:hover { border-color: var(--accent); }
  .row .t { font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:none; max-width:46%; }
  .row .u { color: var(--muted); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
  .empty { width:min(760px,94vw); color: var(--muted); font-size:14px;
    background: var(--panel); border:1px solid var(--line); border-radius:12px; padding:28px; text-align:center; }
  footer { margin-top:auto; padding-top:42px; color:#5a606b; font-size:12px; letter-spacing:.3px; }
  footer a { color:#5a606b; }
</style>
</head>
<body>
  <div class="head">
    <h1>Nav<span class="g">Gator</span> history</h1>
    <p class="sub">Recent pages, newest first · stored locally on this device.</p>
  </div>
  __ROWS__
  <footer>gator://history · <a href="gator://welcome">welcome</a> · <a href="gator://about">about</a></footer>
</body>
</html>
