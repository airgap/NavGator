<!DOCTYPE html>
<!--
  navgator's new-tab / home page. This is *content* — rendered by the content webview and
  composited below the chrome. Its search box and shortcuts navigate the content webview
  itself (window.location), which flows through the engine like any other navigation.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New tab</title>
    <style>
      :root {
        --accent: #7aa2ff;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        background: radial-gradient(120% 120% at 50% 0%, #14233a 0%, #0b1220 60%, #080d16 100%);
        color: #e9eef6;
        font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wordmark {
        font-size: 64px;
        font-weight: 600;
        letter-spacing: -0.03em;
        color: var(--accent);
      }
      form {
        width: min(560px, 84vw);
      }
      .search {
        width: 100%;
        height: 48px;
        padding: 0 20px;
        border-radius: 999px;
        border: 1px solid #2a3a55;
        background: #0d1626;
        color: #e9eef6;
        font: inherit;
        outline: none;
      }
      .search:focus {
        border-color: var(--accent);
      }
      .search::placeholder {
        color: #6f819b;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        max-width: min(620px, 90vw);
      }
      .link {
        padding: 9px 16px;
        border: 1px solid #243246;
        border-radius: 999px;
        background: #0d1626;
        color: #b9c6db;
        text-decoration: none;
        font-size: 13px;
      }
      .link:hover {
        border-color: var(--accent);
        color: #e9eef6;
      }
      .foot {
        position: fixed;
        bottom: 16px;
        color: #51607a;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="wordmark">NavGator</div>

    <form id="search-form">
      <input
        class="search"
        id="q"
        type="text"
        autofocus
        spellcheck="false"
        autocomplete="off"
        placeholder="Search the web or type a URL"
      />
    </form>

    <nav class="links">
      <a class="link" href="https://duckduckgo.com">DuckDuckGo</a>
      <a class="link" href="https://en.wikipedia.org">Wikipedia</a>
      <a class="link" href="https://github.com">GitHub</a>
      <a class="link" href="https://news.ycombinator.com">Hacker News</a>
      <a class="link" href="https://lyku.org">lyku.org</a>
    </nav>

    <div class="foot">NavGator · powered by Servo</div>

    <script>
      // Navigate the content webview itself; the engine treats it as a normal load.
      document.getElementById("search-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const raw = document.getElementById("q").value.trim();
        if (!raw) return;
        const looksLikeUrl =
          /^[a-z][a-z0-9+.-]*:\/\//i.test(raw) || /\.[a-z]{2,}/i.test(raw);
        window.location.href = looksLikeUrl
          ? raw.includes("://")
            ? raw
            : "https://" + raw
          : "https://duckduckgo.com/?q=" + encodeURIComponent(raw);
      });
    </script>
  </body>
</html>
