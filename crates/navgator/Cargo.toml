[package]
name = "navgator"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "MPL-2.0"
description = "A web browser with native (egui) chrome and Servo as the page renderer"
repository = "https://github.com/airgap/NavGator"

# ── Android packaging (cargo-apk) ──────────────────────────────────────────────
[package.metadata.android]
package = "org.airgap.navgator"
build_targets = ["aarch64-linux-android"]

[package.metadata.android.sdk]
min_sdk_version = 30
target_sdk_version = 34

[package.metadata.android.application]
label = "NavGator"

[[package.metadata.android.uses_permission]]
name = "android.permission.INTERNET"

[lib]
name = "navgator"
# rlib for the desktop binary to link; cdylib for the Android NativeActivity (.so).
crate-type = ["lib", "cdylib"]
path = "src/lib.rs"

[[bin]]
name = "navgator"
path = "src/main.rs"

[dependencies]
navgator-engine = { path = "../navgator-engine" }
navgator-protocol = { path = "../navgator-protocol" }

# Windowing / geometry (versions matched to the engine's workspace).
winit = "0.30.13"
euclid = "0.22"
url = "2.5"

# Servo does TLS through rustls; a crypto provider is installed at startup.
rustls = { version = "0.23", default-features = false, features = ["aws-lc-rs"] }

# Native chrome: egui drawn over the page (same versions servoshell uses, so the lock
# resolves cleanly against the engine's glow/winit/raw-window-handle).
egui = "0.34.3"
egui_glow = { version = "0.34.3", features = ["winit"] }
egui-winit = { version = "0.34.3", default-features = false, features = ["clipboard", "wayland"] }
glow = "0.17"
# In-egui file picker (no native GTK/portal dep), as used by servoshell.
egui-file-dialog = "0.13.0"

# Android entry point: winit drives the NativeActivity via android-activity (Android only).
[target.'cfg(target_os = "android")'.dependencies]
android-activity = { version = "0.6", features = ["native-activity"] }
