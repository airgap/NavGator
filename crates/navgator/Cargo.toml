[package]
name = "navgator"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "MPL-2.0"
description = "A web browser whose UI (chrome) is HTML rendered by the Servo engine"
repository = "https://github.com/airgap/NavGator"

[[bin]]
name = "navgator"
path = "src/main.rs"

[dependencies]
navgator-engine = { path = "../navgator-engine" }
navgator-protocol = { path = "../navgator-protocol" }

# Windowing / geometry (versions matched to the engine's workspace).
winit = "0.30.13"
euclid = "0.22"
url = "2.5"

# Servo does TLS through rustls; a crypto provider is installed at startup.
rustls = { version = "0.23", default-features = false, features = ["aws-lc-rs"] }

# Favicon encoding: decoded pixels → PNG → base64 data URL. Both are already in the
# lockfile transitively (via the engine), so these add no new compiled crates.
image = { version = "0.25", default-features = false, features = ["png"] }
base64 = "0.22"
